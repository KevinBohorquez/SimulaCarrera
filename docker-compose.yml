version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: simulacarrera
      POSTGRES_DB: simulacarrera
    ports: ["5432:5432"]
    volumes:
      - ./database:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file: ./backend/.env
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
    ports: ["4000:4000"]
    depends_on: [postgres]

  frontend:
    build:
      context: ./frontend
    env_file: ./frontend/.env
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  pgdata:
